<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFloorPulse | Station</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/station.css">
</head>
<body>

  <header>
    <img id="company-logo" src="" alt="Logo" height="36">
    <span id="app-name"><span class="highlight">S</span>hop<span class="highlight">F</span>loor<span class="highlight">P</span>ulse</span>
    <span id="machine-name" class="machine-name"></span>
  </header>

  <main id="station-main">
    <div id="status-display">
      <div id="big-dot"></div>
      <div id="big-status">--</div>
      <div id="big-since">--</div>

      <!-- Reason + counter shown after reason selected -->
      <div id="reason-display" style="display:none">
        <div id="reason-label"></div>
        <div id="stop-counter">00:00:00</div>
      </div>
    </div>
  </main>

  <!-- Reason Modal -->
  <div id="reason-modal" style="display:none">
    <div class="modal-overlay"></div>
    <div class="modal-box reason-box">
      <h2>Why did the machine stop?</h2>
      <div class="reason-grid">
        <button class="reason-btn" onclick="logReason('Breakdown')">🔧 Breakdown</button>
        <button class="reason-btn" onclick="logReason('No Work')">📭 No Work</button>
        <button class="reason-btn" onclick="logReason('Changeover')">🔄 Changeover</button>
        <button class="reason-btn" onclick="logReason('Cleaning')">🧹 Cleaning</button>
        <button class="reason-btn" onclick="logReason('Planned Maintenance')">📋 Planned Maintenance</button>
        <button class="reason-btn" onclick="logReason('Operator Break')">☕ Operator Break</button>
        <button class="reason-btn" onclick="logReason('Other')">❓ Other</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/station.js"></script>

  <script>
    loadConfig().then(cfg => {
      document.getElementById('company-logo').src = cfg.company.logo;
      document.getElementById('machine-name').textContent = cfg.machines[0].name;
      document.documentElement.style.setProperty('--primary', cfg.company.primaryColour);
      document.documentElement.style.setProperty('--dark', cfg.company.darkColour);
    });
  </script>

</body>
</html>
