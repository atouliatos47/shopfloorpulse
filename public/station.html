<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFloorPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; height: 100vh; display: flex; flex-direction: column; }
    header { background: #FF6B00; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #2c2c2c; }
    #app-name { font-family: 'Russo One', sans-serif; font-size: 22px; letter-spacing: 2px; color: #2c2c2c; }
    #app-name .h { color: #1a6fd4; }
    #machine-name { font-size: 14px; color: #2c2c2c; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #big-dot { width: 120px; height: 120px; border-radius: 50%; background: #aaa; transition: all 0.3s; }
    #big-dot.on { background: #2ecc71; box-shadow: 0 0 50px #2ecc71; }
    #big-dot.off { background: #e74c3c; box-shadow: 0 0 50px #e74c3c; }
    #big-status { font-family: 'Russo One', sans-serif; font-size: 80px; color: #1a1a1a; letter-spacing: 4px; }
    #big-since { font-size: 16px; color: #666; }
    #reason-display { margin-top: 16px; text-align: center; display: none; }
    #reason-label { font-size: 26px; font-weight: 700; color: #e74c3c; text-transform: uppercase; letter-spacing: 2px; }
    #stop-counter { font-family: 'Russo One', sans-serif; font-size: 48px; color: #e74c3c; letter-spacing: 4px; margin-top: 8px; }
    #reason-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; align-items: center; justify-content: center; z-index: 1000; }
    #reason-modal.open { display: flex; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
    .modal-box { position: relative; background: #fff; border-radius: 16px; padding: 32px; width: 95%; max-width: 560px; z-index: 1001; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .modal-box h2 { text-align: center; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; color: #1a1a1a; margin-bottom: 24px; }
    .reason-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .reason-btn { padding: 18px 12px; background: #f4f6f8; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; color: #1a1a1a; transition: all 0.2s; }
    .reason-btn:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }
  </style>
</head>
<body>

  <header>
    <span id="app-name"><span class="h">S</span>hop<span class="h">F</span>loor<span class="h">P</span>ulse</span>
    <span id="machine-name"></span>
  </header>

  <main>
    <div id="big-dot"></div>
    <div id="big-status">--</div>
    <div id="big-since">--</div>
    <div id="reason-display">
      <div id="reason-label"></div>
      <div id="stop-counter">00:00:00</div>
    </div>
  </main>

  <div id="reason-modal">
    <div class="overlay"></div>
    <div class="modal-box">
      <h2>Why did it stop?</h2>
      <div class="reason-grid">
        <button class="reason-btn" onclick="logReason('Breakdown')">🔧 Breakdown</button>
        <button class="reason-btn" onclick="logReason('No Work / No Orders')">📭 No Work</button>
        <button class="reason-btn" onclick="logReason('Changeover / Setup')">🔄 Changeover</button>
        <button class="reason-btn" onclick="logReason('Cleaning')">🧹 Cleaning</button>
        <button class="reason-btn" onclick="logReason('Planned Maintenance')">📋 Planned Maint.</button>
        <button class="reason-btn" onclick="logReason('Operator Break')">☕ Operator Break</button>
        <button class="reason-btn" onclick="logReason('Other')">❓ Other</button>
      </div>
    </div>
  </div>

  <script>
    const MACHINE_ID = window.location.pathname.split('/').pop();
    const API = '/api';
    let currentStatus = '';
    let reasonLogged = false;
    let stopStart = null;
    let stopTimer = null;

    fetch(API + '/config').then(r => r.json()).then(cfg => {
      const machine = cfg.machines.find(m => m.id === MACHINE_ID) || cfg.machines[0];
      document.getElementById('machine-name').textContent = machine.name;
      document.title = 'ShopFloorPulse — ' + machine.name;
    });

    function updateDisplay(status, timestamp) {
      const s = status?.toLowerCase();
      document.getElementById('big-dot').className = s || '';
      document.getElementById('big-status').textContent = status?.toUpperCase() || '--';
      document.getElementById('big-since').textContent = timestamp
        ? 'Since ' + new Date(timestamp).toLocaleTimeString('en-GB') : '--';

      if (s === 'off' && currentStatus !== 'off' && !reasonLogged) {
        document.getElementById('reason-display').style.display = 'none';
        document.getElementById('reason-label').textContent = '';
        document.getElementById('reason-modal').classList.add('open');
      }

      if (s === 'on') {
        if (!reasonLogged && currentStatus === 'off') {
          fetch(API + '/reason', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ machine_id: MACHINE_ID, reason: 'Not logged' })
          });
        }
        reasonLogged = false;
        clearInterval(stopTimer);
        stopStart = null;
        document.getElementById('stop-counter').textContent = '00:00:00';
        document.getElementById('reason-modal').classList.remove('open');
        document.getElementById('reason-display').style.display = 'none';
      }

      currentStatus = s;
    }

    async function logReason(reason) {
      reasonLogged = true;
      stopStart = new Date();
      stopTimer = setInterval(() => {
        const elapsed = Math.floor((new Date() - stopStart) / 1000);
        const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
        const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        document.getElementById('stop-counter').textContent = `${h}:${m}:${s}`;
      }, 1000);
      document.getElementById('reason-modal').classList.remove('open');
      document.getElementById('reason-label').textContent = reason;
      document.getElementById('reason-display').style.display = 'block';
      await fetch(API + '/reason', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ machine_id: MACHINE_ID, reason })
      });
    }

    function loadStatus() {
      fetch(API + '/status/' + MACHINE_ID)
        .then(r => r.json())
        .then(data => updateDisplay(data.status, data.timestamp))
        .catch(err => console.error(err));
    }

    function connectSSE() {
      const es = new EventSource(API + '/stream');
      es.onopen = () => { loadStatus(); };
      es.onmessage = e => {
        const data = JSON.parse(e.data);
        if (data.machine_id === MACHINE_ID) updateDisplay(data.status, data.timestamp);
      };
      es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
    }

    loadStatus();
    setInterval(loadStatus, 5000);
    connectSSE();
  </script>

</body>
</html>
