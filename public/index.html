<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFloorPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #app-name { font-family: 'Russo One', sans-serif; font-size: 22px; letter-spacing: 2px; color: #4a4a4a; }
    #app-name .highlight { color: #1a6fd4; }
  </style>
</head>
<body>

  <header>
    <img id="company-logo" src="" alt="Company Logo" height="36">
    <span id="app-name"><span class="highlight">S</span>hop<span class="highlight">F</span>loor<span class="highlight">P</span>ulse</span>
    <span id="machine-name" class="machine-name"></span>
  </header>

  <main>
    <section id="status-card"></section>
    <section id="timeline-card"></section>
    <section id="events-card"></section>
  </main>

  <div id="events-modal" style="display:none">
    <div class="modal-overlay" onclick="closeEventsModal()"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2>Event Log — Today</h2>
        <button class="modal-close" onclick="closeEventsModal()">✕</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Status</th>
            <th>Reason</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="events-tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    var MACHINE_ID = new URLSearchParams(window.location.search).get('machine') || 'pero-degreaser';
    var API = '/api';
  </script>
  <script src="/js/config.js"></script>
  <script src="/js/status.js"></script>
  <script src="/js/timeline.js"></script>
  <script src="/js/events.js"></script>

  <script>
    loadConfig().then(cfg => {
      const machine = cfg.machines.find(m => m.id === MACHINE_ID) || cfg.machines[0];
      document.title = cfg.app.name + ' — ' + machine.name;
      document.getElementById('company-logo').src = cfg.company.logo;
      document.getElementById('machine-name').textContent = machine.name;
      document.documentElement.style.setProperty('--primary', cfg.company.primaryColour);
      document.documentElement.style.setProperty('--dark', cfg.company.darkColour);
    });
  </script>

</body>
</html>
