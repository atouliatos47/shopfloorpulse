<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopFloorPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #app-name { font-family: 'Russo One', sans-serif; font-size: 22px; letter-spacing: 2px; color: #2c2c2c; }
    #app-name .highlight { color: #1a6fd4; }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <span id="app-name"><span class="highlight">S</span>hop<span class="highlight">F</span>loor<span class="highlight">P</span>ulse</span>
    </div>
    <div class="header-right">
      <button class="add-btn" onclick="openAddMachine()">+ Add Machine</button>
    </div>
  </header>

  <main>
    <div id="machine-grid"></div>
  </main>

  <!-- Add Machine Modal -->
  <div id="add-modal" style="display:none">
    <div class="modal-overlay" onclick="closeAddMachine()"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2>Add Machine</h2>
        <button class="modal-close" onclick="closeAddMachine()">✕</button>
      </div>
      <div class="modal-form">
        <label>Machine Name</label>
        <input type="text" id="new-machine-name" placeholder="e.g. Amada Press" />
        <label>Machine ID</label>
        <input type="text" id="new-machine-id" placeholder="e.g. amada-press" />
        <div id="add-error" class="form-error"></div>
        <button class="events-btn" onclick="addMachine()">Add Machine</button>
      </div>
    </div>
  </div>

  <script>
    var API = '/api';
  </script>
  <script src="/js/config.js"></script>
  <script src="/js/dashboard.js"></script>

  <script>
    loadConfig().then(cfg => {
      document.title = cfg.app?.name || 'ShopFloorPulse';
      if (cfg.company?.primaryColour) document.documentElement.style.setProperty('--primary', cfg.company.primaryColour);
      if (cfg.company?.darkColour) document.documentElement.style.setProperty('--dark', cfg.company.darkColour);
      initDashboard(cfg.machines || []);
    });
  </script>

</body>
</html>
